<title>RDR Freeparty Stand</title>
<style>
:root {
  --bg:#050509; --bg2:#0b0714; --card:rgba(18,18,28,.84); --text:#f8f7ff; --muted:#bbb6d8;
  --line:rgba(255,255,255,.14); --neon:#b7ff2a; --pink:#ff3df2; --cyan:#28e7ff; --orange:#ffb000; --r:26px;
}
* { box-sizing:border-box; }
body {
  margin:0; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif; line-height:1.45;
  background: radial-gradient(circle at 12% 0%,rgba(255,61,242,.24),transparent 28%),
              radial-gradient(circle at 90% 12%,rgba(40,231,255,.20),transparent 30%),
              linear-gradient(145deg,var(--bg),var(--bg2) 45%,#050509);
  min-height:100vh;
}
body:before {
  content:""; position:fixed; inset:0; pointer-events:none; opacity:.13;
  background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:38px 38px;
}
button,input { font:inherit; }
.app { max-width:1180px; margin:0 auto; padding:18px 18px 112px; position:relative; }
.top {
  position:sticky; top:0; z-index:20; background:rgba(5,5,9,.80); backdrop-filter:blur(18px);
  border:1px solid var(--line); border-radius:0 0 24px 24px; margin:0 -8px 18px; padding:12px 14px;
  display:flex; gap:10px; align-items:center; justify-content:space-between; box-shadow:0 18px 55px rgba(0,0,0,.35);
}
.brand { display:flex; align-items:center; gap:10px; font-weight:950; letter-spacing:.08em; text-transform:uppercase; font-size:14px; }
.brand-dot { width:14px; height:14px; border-radius:50%; border:0; padding:0; cursor:pointer; background:#ff2b2b; box-shadow:0 0 18px #ff2b2b,0 0 36px rgba(255,43,43,.6); }
.staff-chip { border:1px solid rgba(255,43,43,.45); background:rgba(255,43,43,.10); color:#ffdede; border-radius:999px; padding:6px 9px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; cursor:pointer; }
.langs { display:flex; gap:7px; flex-wrap:wrap; }
.langs button,.back,.chip { border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--text); border-radius:999px; padding:10px 13px; cursor:pointer; }
.langs button.active,.chip.active { background:linear-gradient(135deg,var(--neon),#fff); color:#050509; border-color:transparent; }
.screen { display:none; }
.screen.active { display:block; }
h1 { font-size:clamp(48px,9vw,98px); line-height:.82; margin:26px 0 16px; letter-spacing:-.075em; text-transform:uppercase; }
h1:after { content:""; display:block; width:min(560px,80vw); height:5px; margin-top:18px; border-radius:999px; background:linear-gradient(90deg,var(--pink),var(--cyan),var(--neon)); }
h2 { font-size:clamp(30px,5vw,52px); margin:20px 0 12px; letter-spacing:-.045em; text-transform:uppercase; }
p { color:var(--muted); margin:0 0 12px; }
.lead { font-size:18px; max-width:860px; color:#ece9ff; }
.kicker { display:inline-flex; font-size:12px; text-transform:uppercase; letter-spacing:.16em; color:#050509; font-weight:950; background:linear-gradient(135deg,var(--cyan),var(--neon)); padding:8px 11px; border-radius:999px; }
.home-columns { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:20px 0; }
.col { display:flex; flex-direction:column; gap:14px; }
.tile,.btn {
  width:100%; min-height:118px; border:1px solid var(--line);
  background:radial-gradient(circle at 12% 20%,rgba(255,61,242,.16),transparent 30%),
             radial-gradient(circle at 86% 12%,rgba(40,231,255,.12),transparent 28%),
             linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
  color:var(--text); border-radius:var(--r); padding:20px; text-align:left; cursor:pointer; position:relative; overflow:hidden;
  box-shadow:0 14px 42px rgba(0,0,0,.25);
}
.tile:before,.btn:before { content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:linear-gradient(var(--pink),var(--cyan),var(--neon)); }
.tile strong,.btn strong { display:block; font-size:clamp(22px,2.5vw,34px); margin-bottom:6px; }
.tile span,.btn span { color:var(--muted); font-size:15px; }
.tile-priority { min-height:154px; border-color:rgba(255,61,242,.45); box-shadow:0 0 46px rgba(255,61,242,.13),0 18px 60px rgba(0,0,0,.36); }
.tile-priority strong { font-size:clamp(34px,5vw,62px); line-height:.95; }
.hero-label { display:inline-flex; color:#050509; background:linear-gradient(135deg,var(--pink),var(--orange),var(--neon)); padding:7px 11px; border-radius:999px; font-weight:950; text-transform:uppercase; letter-spacing:.12em; font-size:12px; margin-bottom:12px; }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; margin:20px 0; }
.detail,.question { background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035)),var(--card); border:1px solid var(--line); border-radius:var(--r); padding:20px; margin:16px 0; box-shadow:0 18px 60px rgba(0,0,0,.32); }
.search { width:100%; border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--text); border-radius:999px; padding:15px 18px; margin:16px 0; outline:none; }
ul { padding-left:22px; }
li { margin:8px 0; color:#eeeaff; }
.section-title { margin-top:20px; border-top:1px solid var(--line); padding-top:15px; color:#fff; font-weight:950; text-transform:uppercase; letter-spacing:.12em; font-size:12px; }
.after-title { color:#050509!important; background:linear-gradient(135deg,var(--neon),#fff); border:0!important; display:inline-flex; padding:8px 12px!important; border-radius:999px; margin-top:24px!important; }
.note { border-left:4px solid var(--neon); background:linear-gradient(90deg,rgba(183,255,42,.13),rgba(255,255,255,.035)); border-radius:14px; padding:12px 14px; margin:14px 0; color:#f5f5f5; }
.supportbox { border-left:4px solid var(--pink); background:linear-gradient(90deg,rgba(255,61,242,.13),rgba(255,255,255,.035)); border-radius:14px; padding:12px 14px; margin:14px 0; color:#f5f5f5; }
.answers { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
a { color:#fff; }
.image-wrap { width:100%; overflow:auto; border:1px solid var(--line); border-radius:22px; background:#000; padding:10px; }
.combo-img { display:block; width:100%; min-width:1180px; height:auto; border-radius:14px; }
.prevention-img { display:block; max-width:100%; width:min(720px,100%); height:auto; margin:0 auto; border-radius:14px; background:#fff; }
.tripsit-main-card { border-color:rgba(183,255,42,.34); box-shadow:0 0 52px rgba(183,255,42,.10),0 18px 60px rgba(0,0,0,.34); }
.interactions-tripsit-wrap { max-height:62vh; margin-top:18px; }
.breath-card { text-align:center; }
.breath-stage { font-size:clamp(32px,7vw,70px); font-weight:950; text-transform:uppercase; letter-spacing:-.04em; margin:10px 0 20px; }
.breath-box { width:min(300px,72vw); height:min(300px,72vw); border:3px solid rgba(183,255,42,.75); border-radius:28px; margin:0 auto 18px; position:relative; box-shadow:0 0 34px rgba(183,255,42,.18), inset 0 0 40px rgba(40,231,255,.08); }
.breath-dot { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--pink),var(--cyan),var(--neon)); box-shadow:0 0 24px rgba(40,231,255,.55); position:absolute; left:-14px; top:-14px; animation:boxBreath 16s linear infinite; }
@keyframes boxBreath { 0%{left:-14px;top:-14px} 25%{left:calc(100% - 14px);top:-14px} 50%{left:calc(100% - 14px);top:calc(100% - 14px)} 75%{left:-14px;top:calc(100% - 14px)} 100%{left:-14px;top:-14px} }
.breath-count { font-size:54px; font-weight:950; color:var(--neon); text-shadow:0 0 24px rgba(183,255,42,.35); }
.bilingual-q strong em { display:block; margin-left:0; margin-top:6px; }
em.fr { color:var(--muted); font-style:italic; margin-left:6px; font-size:.92em; }
.yesno .chip { min-width:120px; text-align:center; }
.footer { position:fixed; left:12px; right:12px; bottom:12px; max-width:1120px; margin:0 auto; background:rgba(10,10,18,.88); backdrop-filter:blur(16px); border:1px solid var(--line); border-radius:999px; padding:11px 15px; display:flex; justify-content:space-between; gap:10px; box-shadow:0 12px 40px rgba(0,0,0,.50); font-size:14px; z-index:25; }
.footer span { color:var(--muted); }
.footer strong { color:#050509; background:linear-gradient(135deg,var(--pink),var(--orange),var(--neon)); padding:6px 11px; border-radius:999px; }
.small { font-size:13px; color:var(--muted); }
@media(max-width:850px) {
  .home-columns,.grid { grid-template-columns:1fr; }
  .tile-priority { min-height:130px; }
  .footer { border-radius:22px; flex-direction:column; align-items:flex-start; }
  .yesno .chip { min-width:100%; text-align:left; }
  em.fr { display:block; margin-left:0; margin-top:4px; }
}
</style>

  setText("listTitle", T(cat));
  const search = $("search");
  if (search) search.value = "";
  renderList();
  screen("list");
}

function renderList() {
  const q = (($("search") || {value:""}).value || "").toLowerCase();
  const grid = $("listGrid");
  if (!grid) return;
  grid.innerHTML = byCat(currentCat)
    .filter(i => (i.title[lang] || i.title.fr).toLowerCase().includes(q))
    .map(i => `<button class="btn" data-detail="${i.id}"><strong>${i.icon} ${i.title[lang] || i.title.fr}</strong><span>${T(currentCat)}</span></button>`)
    .join("");
}

function showDetail(id, from="list") {
  lastDetailFrom = from;
  const i = DB.items.find(x => x.id === id);
  if (!i) return;
  const s = i.s[lang] || i.s.fr;
  const labels = {
    fr:["Ce que c’est","Ce que ça peut faire","Set & setting","Mélanges","Après","Soutien"],
    en:["What it is","What it can do","Set & setting","Mixes","After","Support"],
    es:["Qué es","Qué puede hacer","Set & setting","Mezclas","Después","Apoyo"],
    it:["Cos’è","Cosa può fare","Set & setting","Mix","Dopo","Supporto"]
  }[lang] || [];
  const keys = ["what","effects","setting","mixes","after","support"];
  const box = $("detailBox");
  box.innerHTML = `<div class="detail"><h2>${i.icon} ${i.title[lang] || i.title.fr}</h2>` +
    keys.map((k,idx) => `<div class="${k==='support'?'supportbox':'note'}"><div class="section-title">${labels[idx]}</div><ul>${(s[k]||[]).filter(Boolean).map(x=>`<li>${x}</li>`).join("")}</ul></div>`).join("") +
    (i.pdf ? `<p class="small">PDF : <a href="pdf-originaux/${i.pdf}" target="_blank">${i.pdf}</a></p>` : "") +
    `</div>`;
  screen("detail");
}

function backFromDetail() {
  if (lastDetailFrom === "mix") interactions();
  else showList(currentCat);
}

function interactions() {
  const grid = $("mixGrid");
  grid.innerHTML = byCat("mix").map(i => `<button class="btn" data-detail="${i.id}" data-from="mix"><strong>${i.icon} ${i.title[lang] || i.title.fr}</strong><span>${T("mix")}</span></button>`).join("");
  screen("interactions");
}

function prevention() { screen("prevention"); }

function breathing() {
  const stages = {
    fr:["Inspire","Bloque","Expire","Bloque"],
    en:["Breathe in","Hold","Breathe out","Hold"],
    es:["Inhala","Mantén","Exhala","Mantén"],
    it:["Inspira","Trattieni","Espira","Trattieni"]
  }[lang] || ["Inspire","Bloque","Expire","Bloque"];
  screen("breathing");
  let phase = 0;
  let count = 4;
  clearInterval(breathTimer);
  const tick = () => {
    setText("breathStage", stages[phase]);
    setText("breathCount", String(count));
    count -= 1;
    if (count < 1) {
      count = 4;
      phase = (phase + 1) % 4;
    }
  };
  tick();
  breathTimer = setInterval(tick, 1000);
}

function staff() { screen("staff"); }

function publicBadtrip() {
  setText("publicBadTitle", T("publicBadTitle"));
  setText("publicBadLead", T("publicBadLead"));
  setText("publicBadIntro", T("publicBadIntro"));
  const box = $("publicBadQuestions");
  box.innerHTML = T("pbQ").map((question, idx) => `
    <div class="question bilingual-q">
      <strong>${question} <em class="fr">${T("frQ")[idx]}</em></strong>
      <div class="answers yesno">
        <button class="chip">${T("publicYes")} <em class="fr">Oui</em></button>
        <button class="chip">${T("publicNo")} <em class="fr">Non</em></button>
        <button class="chip">${T("publicDK")} <em class="fr">Je ne sais pas</em></button>
      </div>
    </div>
  `).join("") + `<div class="supportbox">112 si respiration bizarre, inconscience, convulsions, douleur thoracique ou mise en danger. Rester avec la personne.</div>`;
  screen("publicBadtrip");
}

function handleClick(e) {
  const el = e.target.closest("[data-action],[data-list],[data-detail],[data-choose],[data-lang]");
  if (!el) return;
  const langCode = el.getAttribute("data-lang") || el.getAttribute("data-choose");
  if (langCode) { choose(langCode); return; }
  const listCat = el.getAttribute("data-list");
  if (listCat) { showList(listCat); return; }
  const detailId = el.getAttribute("data-detail");
  if (detailId) { showDetail(detailId, el.getAttribute("data-from") || "list"); return; }
  const action = el.getAttribute("data-action");
  const actions = { home:()=>screen("home"), backDetail: backFromDetail, interactions, prevention, breathing, staff, publicBadtrip };
  if (actions[action]) actions[action]();
}

document.addEventListener("click", handleClick);
const searchInput = $("search");
if (searchInput) searchInput.addEventListener("input", renderList);
setLang(lang);
</script>
</body>
</html>
