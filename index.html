e tapan."], "after": ["Descanso, agua, comida simple, sueño. Evitar conducir mientras haya cansancio o efectos."], "support": ["Difícil despertar, respiración rara, vómitos dormido/a, caída importante: poner de lado, quedarse, pedir apoyo."]}, "it": {"what": ["Depressore del sistema nervoso centrale, molto comune in festa."], "effects": ["Disinibizione, euforia, socialità, coordinazione ridotta, vuoti di memoria, possibile nausea."], "setting": ["Mangiare prima, spaziare i drink, alternare acqua, preparare il ritorno."], "mix": ["GHB/GBL, benzo, oppiacei, sonniferi: sonno profondo e respiro lento possono rinforzarsi. Ketamina: vomito e blackout. Cocaina: effetti che si mascherano."], "after": ["Riposo, acqua, cibo semplice, sonno. Evitare guida con stanchezza o effetti presenti."], "support": ["Difficile svegliare, respiro strano, vomito dormendo, caduta importante: fianco, restare, chiedere supporto."]}}}, {"id": "cannabis", "icon": "🌿", "pdf": "Flyer-Cannabis.pdf", "title": {"fr": "Cannabis", "en": "Cannabis", "es": "Cannabis", "it": "Cannabis"}, "s": {"fr": {"what": ["Plante psychoactive dont les effets dépendent du THC/CBD, de la voie et du contexte."], "effects": ["Détente, rire, sensations amplifiées, temps modifié. Peut aussi amplifier anxiété, parano, tachycardie ou malaise."], "setting": ["Contexte rassurant, rythme tranquille, personnes de confiance. Avec ingestion, attendre longtemps avant reprise."], "mix": ["Alcool : nausées/somnolence. Psychédéliques : intensification possible. Stimulants : peut calmer ou amplifier la parano."], "after": ["Se poser, respirer, réduire son/lumière/foule. Éviter de reprendre pour corriger avant de comprendre l’effet."], "support": ["Confusion très forte, douleur thoracique, perte de connaissance ou malaise persistant : demander du soutien."]}, "en": {"what": ["Psychoactive plant; effects depend on THC/CBD, route and setting."], "effects": ["Relaxation, laughter, amplified sensations, altered time. Can also amplify anxiety, paranoia, fast heartbeat or faintness."], "setting": ["Reassuring setting, slow pace, trusted people. With edibles, wait a long time before redosing."], "mix": ["Alcohol: nausea/sleepiness. Psychedelics: possible intensification. Stimulants: can calm or amplify paranoia."], "after": ["Settle down, breathe, reduce sound/light/crowd. Avoid redosing to fix before understanding the effect."], "support": ["Very strong confusion, chest pain, loss of consciousness or persistent faintness: seek support."]}, "es": {"what": ["Planta psicoactiva; efectos según THC/CBD, vía y contexto."], "effects": ["Relajación, risa, sensaciones amplificadas, tiempo alterado. También puede amplificar ansiedad, paranoia, taquicardia o mareo."], "setting": ["Contexto seguro, ritmo tranquilo, gente de confianza. Con comestibles, esperar mucho antes de repetir."], "mix": ["Alcohol: náusea/sueño. Psicodélicos: posible intensificación. Estimulantes: puede calmar o amplificar paranoia."], "after": ["Sentarse, respirar, reducir sonido/luz/gente. Evitar repetir para corregir antes de entender el efecto."], "support": ["Confusión muy fuerte, dolor en el pecho, pérdida de conciencia o mareo persistente: pedir apoyo."]}, "it": {"what": ["Pianta psicoattiva; effetti secondo THC/CBD, via e contesto."], "effects": ["Relax, risate, sensazioni amplificate, tempo alterato. Può anche amplificare ansia, paranoia, cuore veloce o malessere."], "setting": ["Contesto rassicurante, ritmo tranquillo, persone fidate. Con edibili, aspettare molto prima di ripetere."], "mix": ["Alcol: nausea/sonno. Psichedelici: possibile intensificazione. Stimolanti: può calmare o amplificare paranoia."], "after": ["Sedersi, respirare, ridurre suono/luci/folla. Evitare di ripetere per correggere prima di capire l’effetto."], "support": ["Confusione molto forte, dolore al petto, perdita di coscienza o malessere persistente: chiedere supporto."]}}}, {"id": "mdma", "icon": "💎", "pdf": "Flyer-Taz-Mdma.pdf", "title": {"fr": "MDMA / Taz", "en": "MDMA / Ecstasy", "es": "MDMA / Éxtasis", "it": "MDMA / Ecstasy"}, "s": {"fr": {"what": ["Empathogène/stimulant, souvent cachet, cristal ou poudre."], "effects": ["Envie de parler, proximité émotionnelle, toucher amplifié, énergie, danse. Chaleur, mâchoire serrée, nausées et descente possible."], "setting": ["Personnes de confiance, repas quelques heures avant, eau, pauses, coin calme, repos le lendemain."], "mix": ["Alcool : déshydratation et décisions moins claires. Speed/stimulants : charge corporelle. Antidépresseurs/tramadol/sérotoninergiques : interactions importantes."], "after": ["Repos, fruits/sucré, hydratation calme, sommeil. Le moral peut fluctuer après."], "support": ["Hyperthermie, convulsions, douleur thoracique, confusion forte ou malaise : soutien rapide."]}, "en": {"what": ["Empathogenic/stimulant, often pill, crystal or powder."], "effects": ["Talkativeness, emotional closeness, enhanced touch, energy, dancing. Heat, jaw clenching, nausea and comedown possible."], "setting": ["Trusted people, eat a few hours before, water, breaks, calm spot, rest the next day."], "mix": ["Alcohol: dehydration and less clear decisions. Speed/stimulants: body load. Antidepressants/tramadol/serotonergic meds: important interactions."], "after": ["Rest, fruit/sugar, calm hydration, sleep. Mood can fluctuate afterwards."], "support": ["Overheating, seizures, chest pain, strong confusion or faintness: quick support."]}, "es": {"what": ["Empatógeno/estimulante, a menudo pastilla, cristal o polvo."], "effects": ["Ganas de hablar, cercanía emocional, tacto amplificado, energía, baile. Calor, mandíbula, náusea y bajada posibles."], "setting": ["Gente de confianza, comer unas horas antes, agua, pausas, sitio tranquilo, descanso al día siguiente."], "mix": ["Alcohol: deshidratación y decisiones menos claras. Speed/estimulantes: carga corporal. Antidepresivos/tramadol/serotoninérgicos: interacciones importantes."], "after": ["Descanso, fruta/azúcar, hidratación tranquila, function renderList(){const arr=DATA[currentCat]||[];const q=$('search').value.toLowerCase();$('listGrid').innerHTML=arr.filter(i=>(i.title[lang]||i.title.fr).toLowerCase().includes(q)).map(i=>`<button class="btn" onclick="detail('${i.id}')"><strong>${i.icon} ${i.title[lang]||i.title.fr}</strong><span>${T(currentCat)}</span></button>`).join('')}
function findItem(id){return [...DATA.products,...DATA.terrain,...DATA.mix].find(i=>i.id===id)}
function detail(id){const i=findItem(id);const s=i.sections[lang]||i.sections.fr;const labs={what:'Ce que c’est',effects:'Ce que ça peut faire',setting:'Set & setting / accompagner',mix:'Mélanges à connaître',after:'Descente / après',support:'Quand demander du soutien'};const pdf=i.pdf?`<p class="small">PDF original : <a href="pdf-originaux/${i.pdf}" target="_blank">${i.pdf}</a></p>`:'';$('detailBox').innerHTML=`<div class="detail"><h2>${i.icon} ${i.title[lang]||i.title.fr}</h2>${Object.keys(labs).map(k=>`<div class="${k==='support'?'supportbox':'note'}"><div class="section-title">${labs[k]}</div><ul>${(s[k]||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>`).join('')}${pdf}</div>`;screen('detail')}
function showTripsit(){screen('tripsit')} function showPrevention(){renderKeep();screen('prevention')} function showStaff(){screen('staff')}
function renderKeep(){const l={fr:["Les benzos peuvent favoriser somnolence, amnésie, baisse de vigilance et désinhibition.","Avec alcool, GHB/GBL, opiacés, kétamine ou autres dépresseurs, l’endormissement et la respiration ralentie peuvent se renforcer.","Éviter de laisser dormir seule une personne très somnolente ; la mettre sur le côté si elle vomit ou s’endort profondément."],en:["Benzos can cause sleepiness, amnesia, reduced alertness and disinhibition.","With alcohol, GHB/GBL, opioids, ketamine or other depressants, sleepiness and slowed breathing can be reinforced.","Avoid leaving a very sleepy person alone; place them on their side if vomiting or deeply asleep."],es:["Las benzos pueden causar somnolencia, amnesia, menor vigilancia y desinhibición.","Con alcohol, GHB/GBL, opiáceos, ketamina u otros depresores, sueño y respiración lenta pueden reforzarse.","Evitar dejar sola a una persona muy somnolienta; ponerla de lado si vomita o duerme profundamente."],it:["Le benzo possono causare sonnolenza, amnesia, vigilanza ridotta e disinibizione.","Con alcol, GHB/GBL, oppiacei, ketamina o altri depressori, sonno e respiro lento possono rinforzarsi.","Evitare di lasciare sola una persona molto assonnata; metterla sul fianco se vomita o dorme profondamente."]};$('keepList').innerHTML=(l[lang]||l.fr).map(x=>`<li>${x}</li>`).join('')}
const BADQ=[['breath','La personne respire-t-elle normalement ?',['Oui','Non / bizarrement','Je ne sais pas']],['conscious','La personne répond-elle quand tu lui parles ?',['Oui','Répond un peu','Non / impossible à réveiller']],['pain','Douleur forte ?',['Oui','Non','Je ne sais pas']],['heat','Très chaud / transpire beaucoup / peau brûlante ?',['Oui','Non','Je ne sais pas']],['fear','Très peur / panique / parano ?',['Oui','Non','Je ne sais pas']],['vomit','Vomi ou envie de vomir ?',['Oui','Non','Je ne sais pas']],['sleepy','Très somnolente ?',['Oui','Non','Je ne sais pas']],['mix','Mélange possible avec alcool + GHB/GBL / benzos / opiacés / kétamine ?',['Oui','Non','Je ne sais pas']],['taken','Ce qu’elle pense avoir pris',['Alcool','Cannabis','MDMA / taz','Speed','Coke','Kétamine','LSD / champis','GHB / GBL','DMT','Héro / opiacés','Benzos','Je ne sais pas']]];
function showBadtrip(){$('badQuestions').innerHTML=`<div class="note">Priorité : respiration → conscience → douleur / chaud / peur. Ne juge pas la conso. Ne laisse pas la personne seule.</div>`+BADQ.map(q=>`<div class="question" data-q="${q[0]}"><strong>${q[1]}</strong><div class="answers">${q[2].map(a=>`<button class="chip" onclick="this.classList.toggle('active')">${a}</button>`).join('')}</div></div>`).join('');$('badResult').style.display='none';screen('badtrip')}
function ans(id){const el=document.querySelector(`[data-q="${id}"]`);return el?Array.from(el.querySelectorAll('.chip.active')).map(b=>b.textContent):[]}function yes(id){return ans(id).some(x=>x.startsWith('Oui'))}function bad(id){return ans(id).some(x=>/Non|bizarre|Je ne sais pas|impossible/.test(x))}
function analyzeBadtrip(){let A='Analyse : état à surveiller calmement',B='Action : chill-out + présence + eau par petites gorgées si consciente + repos + ne pas laisser seule.';if(bad('breath')){A='Analyse : possible détresse vitale';B='Action : 112 maintenant + PLS si elle respire + surveillance respiration + reste avec elle.'}else if(bad('conscious')){A='Analyse : personne inconsciente ou difficile à réveiller';B='Action : 112 + PLS si elle respire + ne donne ni eau ni sucre + ne la laisse pas seule.'}else if(yes('pain')){A='Analyse : douleur à prendre au sérieux';B='Action : calme + demande où elle a mal + reste avec elle. Douleur thoracique / chute / respiration bizarre → 112.'}else if(yes('heat')){A='Analyse : chaleur / effort / stimulation';B='Action : chill-out + enlever veste/bonnet + air frais + petites gorgées si consciente. Confusion/convulsions → 112.'}else if(yes('sleepy')||yes('mix')){A='Analyse : grosse somnolence / mélange dépresseur possible';B='Action : ne laisse pas dormir seule + côté si elle s’endort + surveille respiration. Difficile à réveiller → 112.'}else if(yes('vomit')){A='Analyse : nausée / vomissement';B='Action : côté ou assise penchée en avant + reste avec elle + eau seulement si bien consciente.'}else if(yes('fear')){A='Analyse : montée difficile / bad trip';B='Action : éloigne du son + parle doucement + rappelle que ça redescend + reste avec elle + petites gorgées si consciente.'}$('badResult').style.display='block';$('badResult').innerHTML=`<h2>Questionnaire Badtrip</h2><div class="supportbox"><strong>${A}</strong><br>→ ${B}</div><div class="section-title">Rappel terrain</div><ul><li>Ne juge pas la consommation.</li><li>Ne laisse jamais la personne seule.</li><li>Note ce qu’elle a pris, l’heure, les mélanges, et ce qui change.</li></ul>`;$('badResult').scrollIntoView({behavior:'smooth'})}
const INTL={en:{title:'English',yes:['Yes','Oui'],no:['No','Non'],dk:['I don’t know','Je ne sais pas'],qs:[['Are you breathing okay?','Tu respires correctement ?'],['Can you hear me and answer?','Tu m’entends et tu peux répondre ?'],['Do you have strong pain?','Tu as une douleur forte ?'],['Do you feel too hot?','Tu as trop chaud ?'],['Are you very scared or panicking?','Tu as très peur / tu paniques ?'],['Do you feel like vomiting?','Tu as envie de vomir ?'],['Did you drink alcohol?','Tu as bu de l’alcool ?'],['Did you take GHB/GBL, benzos, opioids or ketamine?','Tu as pris GHB/GBL, benzos, opiacés ou kétamine ?'],['Do you want a quiet place?','Tu veux un endroit calme ?'],['Do you want a trusted friend?','Tu veux une personne de confiance ?']]},es:{title:'Español',yes:['Sí','Oui'],no:['No','Non'],dk:['No lo sé','Je ne sais pas'],qs:[['¿Respiras bien?','Tu respires correctement ?'],['¿Puedes oírme y responder?','Tu m’entends et tu peux répondre ?'],['¿Tienes un dolor fuerte?','Tu as une douleur forte ?'],['¿Tienes demasiado calor?','Tu as trop chaud ?'],['¿Tienes mucho miedo o pánico?','Tu as très peur / tu paniques ?'],['¿Tienes ganas de vomitar?','Tu as envie de vomir ?'],['¿Has bebido alcohol?','Tu as bu de l’alcool ?'],['¿Has tomado GHB/GBL, benzos, opiáceos o ketamina?','Tu as pris GHB/GBL, benzos, opiacés ou kétamine ?'],['¿Quieres un lugar tranquilo?','Tu veux un endroit calme ?'],['¿Quieres una persona de confianza?','Tu veux une personne de confiance ?']]},it:{title:'Italiano',yes:['Sì','Oui'],no:['No','Non'],dk:['Non lo so','Je ne sais pas'],qs:[['Respiri bene?','Tu respires correctement ?'],['Mi senti e riesci a rispondere?','Tu m’entends et tu peux répondre ?'],['Hai un dolore forte?','Tu as une douleur forte ?'],['Hai troppo caldo?','Tu as trop chaud ?'],['Hai molta paura o panico?','Tu as très peur / tu paniques ?'],['Ti viene da vomitare?','Tu as envie de vomir ?'],['Hai bevuto alcol?','Tu as bu de l’alcool ?'],['Hai preso GHB/GBL, benzo, oppiacei o ketamina?','Tu as pris GHB/GBL, benzos, opiacés ou kétamine ?'],['Vuoi un posto tranquillo?','Tu veux un endroit calme ?'],['Vuoi una persona di fiducia?','Tu veux une personne de confiance ?']]}};
function showIntl(){renderIntl('en');screen('intl')}function renderIntl(l){const f=INTL[l];$('intlBox').innerHTML=`<h2>${f.title}</h2><div class="note">La personne peut cocher oui/non. <em class="fr">Traduction française en italique pour l’intervenant.</em></div>`+f.qs.map(q=>`<div class="question"><strong>${q[0]} <em class="fr">${q[1]}</em></strong><div class="answers yesno"><button class="chip">${f.yes[0]} <em class="fr">${f.yes[1]}</em></button><button class="chip">${f.no[0]} <em class="fr">${f.no[1]}</em></button><button class="chip">${f.dk[0]} <em class="fr">${f.dk[1]}</em></button></div></div>`).join('')+`<div class="supportbox">Si respiration bizarre, inconscience, convulsions ou douleur thoracique : 112 + rester avec la personne.</div>`;document.querySelectorAll('#intlBox .chip').forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active')})}
setLang(lang);
