let lang=localStorage.rdrLang||'fr', currentCat='products';
const $=id=>document.getElementById(id);
function screen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');scrollTo(0,0)}
function T(k){return UI[lang][k]||k}
function setLang(l){lang=l;localStorage.rdrLang=l;['fr','en','es','it'].forEach(x=>$('l'+x).classList.toggle('active',x===l));$('langLead').textContent=T('lead');$('homeLead').textContent=T('lead');$('navProducts').textContent=T('products');$('navTerrain').textContent=T('terrain');$('navMix').textContent=T('mix');$('navStaff').textContent=T('staff');$('subProducts').textContent=T('subProducts');$('subTerrain').textContent=T('subTerrain');$('subMix').textContent=T('subMix');$('subTripsit').textContent=T('subTripsit');$('subPrev').textContent=T('subPrev');$('subStaff').textContent=T('subStaff');$('search').placeholder=T('search');document.querySelectorAll('.backTxt').forEach(e=>e.textContent=T('back'));$('tripLead').textContent=T('trip');$('prevTitle').textContent=T('prev');$('prevLead').textContent=T('prevLead');$('benzoTitle').textContent=T('benzo');$('benzoNote').textContent=T('benzoNote');$('keepTitle').textContent=T('keep');$('staffTitle').textContent=T('staff');$('staffLead').textContent=T('staffLead');$('subBad').textContent=T('subBad');$('subIntl').textContent=T('subIntl');$('badLead').textContent=T('badLead');$('analyzeBtn').textContent=T('analyze');$('footerTxt').textContent=T('footer'); renderKeep();}
function choose(l){setLang(l);home()} function home(){screen('home')}
function showList(cat){currentCat=cat;$('listTitle').textContent=T(cat);$('search').value='';renderList();screen('list')}
function renderList(){const arr=DATA[currentCat]||[];const q=$('search').value.toLowerCase();$('listGrid').innerHTML=arr.filter(i=>(i.title[lang]||i.title.fr).toLowerCase().includes(q)).map(i=>`<button class="btn" onclick="detail('${i.id}')"><strong>${i.icon} ${i.title[lang]||i.title.fr}</strong><span>${T(currentCat)}</span></button>`).join('')}
function findItem(id){return [...DATA.products,...DATA.terrain,...DATA.mix].find(i=>i.id===id)}
function detail(id){const i=findItem(id);const s=i.sections[lang]||i.sections.fr;const labs={what:'Ce que c’est',effects:'Ce que ça peut faire',setting:'Set & setting / accompagner',mix:'Mélanges à connaître',after:'Descente / après',support:'Quand demander du soutien'};const pdf=i.pdf?`<p class="small">PDF original : <a href="pdf-originaux/${i.pdf}" target="_blank">${i.pdf}</a></p>`:'';$('detailBox').innerHTML=`<div class="detail"><h2>${i.icon} ${i.title[lang]||i.title.fr}</h2>${Object.keys(labs).map(k=>`<div class="${k==='support'?'supportbox':'note'}"><div class="section-title">${labs[k]}</div><ul>${(s[k]||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>`).join('')}${pdf}</div>`;screen('detail')}
function showTripsit(){screen('tripsit')} function showPrevention(){renderKeep();screen('prevention')} function showStaff(){screen('staff')}
function renderKeep(){const l={fr:["Les benzos peuvent favoriser somnolence, amnésie, baisse de vigilance et désinhibition.","Avec alcool, GHB/GBL, opiacés, kétamine ou autres dépresseurs, l’endormissement et la respiration ralentie peuvent se renforcer.","Éviter de laisser dormir seule une personne très somnolente ; la mettre sur le côté si elle vomit ou s’endort profondément."],en:["Benzos can cause sleepiness, amnesia, reduced alertness and disinhibition.","With alcohol, GHB/GBL, opioids, ketamine or other depressants, sleepiness and slowed breathing can be reinforced.","Avoid leaving a very sleepy person alone; place them on their side if vomiting or deeply asleep."],es:["Las benzos pueden causar somnolencia, amnesia, menor vigilancia y desinhibición.","Con alcohol, GHB/GBL, opiáceos, ketamina u otros depresores, sueño y respiración lenta pueden reforzarse.","Evitar dejar sola a una persona muy somnolienta; ponerla de lado si vomita o duerme profundamente."],it:["Le benzo possono causare sonnolenza, amnesia, vigilanza ridotta e disinibizione.","Con alcol, GHB/GBL, oppiacei, ketamina o altri depressori, sonno e respiro lento possono rinforzarsi.","Evitare di lasciare sola una persona molto assonnata; metterla sul fianco se vomita o dorme profondamente."]};$('keepList').innerHTML=(l[lang]||l.fr).map(x=>`<li>${x}</li>`).join('')}
const BADQ=[['breath','La personne respire-t-elle normalement ?',['Oui','Non / bizarrement','Je ne sais pas']],['conscious','La personne répond-elle quand tu lui parles ?',['Oui','Répond un peu','Non / impossible à réveiller']],['pain','Douleur forte ?',['Oui','Non','Je ne sais pas']],['heat','Très chaud / transpire beaucoup / peau brûlante ?',['Oui','Non','Je ne sais pas']],['fear','Très peur / panique / parano ?',['Oui','Non','Je ne sais pas']],['vomit','Vomi ou envie de vomir ?',['Oui','Non','Je ne sais pas']],['sleepy','Très somnolente ?',['Oui','Non','Je ne sais pas']],['mix','Mélange possible avec alcool + GHB/GBL / benzos / opiacés / kétamine ?',['Oui','Non','Je ne sais pas']],['taken','Ce qu’elle pense avoir pris',['Alcool','Cannabis','MDMA / taz','Speed','Coke','Kétamine','LSD / champis','GHB / GBL','DMT','Héro / opiacés','Benzos','Je ne sais pas']]];
function showBadtrip(){$('badQuestions').innerHTML=`<div class="note">Priorité : respiration → conscience → douleur / chaud / peur. Ne juge pas la conso. Ne laisse pas la personne seule.</div>`+BADQ.map(q=>`<div class="question" data-q="${q[0]}"><strong>${q[1]}</strong><div class="answers">${q[2].map(a=>`<button class="chip" onclick="this.classList.toggle('active')">${a}</button>`).join('')}</div></div>`).join('');$('badResult').style.display='none';screen('badtrip')}
function ans(id){const el=document.querySelector(`[data-q="${id}"]`);return el?Array.from(el.querySelectorAll('.chip.active')).map(b=>b.textContent):[]}function yes(id){return ans(id).some(x=>x.startsWith('Oui'))}function bad(id){return ans(id).some(x=>/Non|bizarre|Je ne sais pas|impossible/.test(x))}
function analyzeBadtrip(){let A='Analyse : état à surveiller calmement',B='Action : chill-out + présence + eau par petites gorgées si consciente + repos + ne pas laisser seule.';if(bad('breath')){A='Analyse : possible détresse vitale';B='Action : 112 maintenant + PLS si elle respire + surveillance respiration + reste avec elle.'}else if(bad('conscious')){A='Analyse : personne inconsciente ou difficile à réveiller';B='Action : 112 + PLS si elle respire + ne donne ni eau ni sucre + ne la laisse pas seule.'}else if(yes('pain')){A='Analyse : douleur à prendre au sérieux';B='Action : calme + demande où elle a mal + reste avec elle. Douleur thoracique / chute / respiration bizarre → 112.'}else if(yes('heat')){A='Analyse : chaleur / effort / stimulation';B='Action : chill-out + enlever veste/bonnet + air frais + petites gorgées si consciente. Confusion/convulsions → 112.'}else if(yes('sleepy')||yes('mix')){A='Analyse : grosse somnolence / mélange dépresseur possible';B='Action : ne laisse pas dormir seule + côté si elle s’endort + surveille respiration. Difficile à réveiller → 112.'}else if(yes('vomit')){A='Analyse : nausée / vomissement';B='Action : côté ou assise penchée en avant + reste avec elle + eau seulement si bien consciente.'}else if(yes('fear')){A='Analyse : montée difficile / bad trip';B='Action : éloigne du son + parle doucement + rappelle que ça redescend + reste avec elle + petites gorgées si consciente.'}$('badResult').style.display='block';$('badResult').innerHTML=`<h2>Questionnaire Badtrip</h2><div class="supportbox"><strong>${A}</strong><br>→ ${B}</div><div class="section-title">Rappel terrain</div><ul><li>Ne juge pas la consommation.</li><li>Ne laisse jamais la personne seule.</li><li>Note ce qu’elle a pris, l’heure, les mélanges, et ce qui change.</li></ul>`;$('badResult').scrollIntoView({behavior:'smooth'})}

function showIntl(){renderIntl('en');screen('intl')}function renderIntl(l){const f=INTL[l];$('intlBox').innerHTML=`<h2>${f.title}</h2><div class="note">La personne peut cocher oui/non. <em class="fr">Traduction française en italique pour l’intervenant.</em></div>`+f.qs.map(q=>`<div class="question"><strong>${q[0]} <em class="fr">${q[1]}</em></strong><div class="answers yesno"><button class="chip">${f.yes[0]} <em class="fr">${f.yes[1]}</em></button><button class="chip">${f.no[0]} <em class="fr">${f.no[1]}</em></button><button class="chip">${f.dk[0]} <em class="fr">${f.dk[1]}</em></button></div></div>`).join('')+`<div class="supportbox">Si respiration bizarre, inconscience, convulsions ou douleur thoracique : 112 + rester avec la personne.</div>`;document.querySelectorAll('#intlBox .chip').forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active')})}
